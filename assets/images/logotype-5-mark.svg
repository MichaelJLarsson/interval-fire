<svg width="300" height="90" viewBox="0 0 300 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="90" fill="#0d0d0d"/>

  <defs>
    <linearGradient id="mark-grad" x1="27" y1="68" x2="27" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffc300"/>
      <stop offset="100%" stop-color="#ff3d3d"/>
    </linearGradient>
  </defs>

  <!--
    Mark concept: the Λ chevron from the app icon sits left as a symbol,
    paired with the stacked INTERVAL / FIRE wordmark. No emoji flame —
    the Λ itself IS the brand mark.
  -->

  <!-- Λ chevron mark — gradient fill, 54×64px centred vertically at x=8 -->
  <g transform="translate(8, 13)">
    <path d="M27,4 L2,64 L14,64 L27,32 L40,64 L52,64 Z" fill="url(#mark-grad)"/>
  </g>

  <!-- Vertical separator -->
  <line x1="74" y1="16" x2="74" y2="74" stroke="#2a2a2a" stroke-width="1"/>

  <!-- INTERVAL — muted, light weight -->
  <text
    x="84" y="36"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-weight="300"
    font-size="20"
    letter-spacing="3"
    fill="#888888">INTERVAL</text>

  <!-- FIRE — white, bold -->
  <text
    x="82" y="74"
    font-family="'Barlow Condensed', 'Arial Narrow', sans-serif"
    font-weight="700"
    font-size="42"
    letter-spacing="1"
    fill="#f0f0f0">FIRE</text>
</svg>
